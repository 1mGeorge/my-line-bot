<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>My Schedule</title>
  
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.11/index.global.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');

      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        googleCalendarApiKey: 'AIzaSyBSIUa2TCzd7zwjMBESNy5XCKD-sBvV_1g', // Paste your API key from Phase 2
        events: 'b93896a7733835afd1d74ea5ec0f9bd8b7a404a51b0b26250d3eac3582e57a61@group.calendar.google.com',           // Paste your Calendar ID from Phase 1
        
        // Optional: Customize header toolbar
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        }
      });

      calendar.render();
    });
  </script>

  <style>
    /* Add some basic styling to constrain the calendar size */
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #calendar {
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="calendar"></div>

</body>
</html>
