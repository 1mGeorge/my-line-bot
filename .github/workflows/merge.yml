name: Merge PDFs

on:
  workflow_dispatch:
    inputs:
      pdf1_id:
        description: 'Message ID of the first PDF'
        required: true
      pdf2_id:
        description: 'Message ID of the second PDF'
        required: true
      user_id:
        description: 'LINE User ID to notify'
        required: true

jobs:
  merge-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyPDF2 requests

      - name: Run merge script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          PDF1_ID: ${{ github.event.inputs.pdf1_id }}
          PDF2_ID: ${{ github.event.inputs.pdf2_id }}
          USER_ID: ${{ github.event.inputs.user_id }}
        run: python merge.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dummy.pdf
          git commit -m "Update dummy.pdf via GitHub Actions" || echo "No changes to commit"
          git push
